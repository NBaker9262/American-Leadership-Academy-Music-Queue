name: Lyrics Cache Refresh

'on':
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"
  push:
    paths:
      - scripts/build_lyrics_cache.py
      - lyrics_api_server.py
      - requirements.txt
      - .github/workflows/lyrics-cache-refresh.yml

permissions:
  contents: write

concurrency:
  group: lyrics-cache-refresh
  cancel-in-progress: false

jobs:
  build-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build lyrics cache
        env:
          REQUESTS_CSV_URL: https://docs.google.com/spreadsheets/d/e/2PACX-1vQyc3RRDmjc-nN-XgMMDocbnn1tlxue5ynNoNnYSxnRKxgp2LRGNmYZXnVgAFLH7IViwTAtmIAkvDsK/pub?output=csv
          LYRICS_CACHE_REFRESH_MINUTES: "5"
          LYRICS_SCRAPE_DELAY_MS: "150"
          LYRICS_CACHE_MAX_TRACKS: "500"
        run: |
          python scripts/build_lyrics_cache.py

      - name: Detect cache changes
        id: detect_changes
        run: |
          if git diff --quiet -- lyrics-cache.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push cache updates
        if: steps.detect_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lyrics-cache.json
          git commit -m "chore(cache): refresh lyrics cache"
          git push
